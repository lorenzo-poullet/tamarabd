<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Happy Anniversary Tamara</title>
  <style>
    :root {
      /* Couleurs : modifie ici la palette principale */
      --bg-top: #ff9ddb;
      --bg-bottom: #a871ff;
      --panel: #fff8f3;
      --panel-alt: #d7e8ff;
      --pink: #ff7cc8;
      --pink-dark: #ff59b5;
      --violet: #915eff;
      --violet-dark: #6b3fe2;
      --blue: #a8d3ff;
      --blue-dark: #73b7ff;
      --ink: #151219;
      --shadow: #000000;
      --grid: rgba(255, 255, 255, 0.18);
      --max-width: 430px;
      --pixel-shadow: 4px 4px 0 var(--shadow);
      --pixel-border: 3px solid var(--ink);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Courier New", Courier, monospace;
      background:
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom)),
        repeating-linear-gradient(
          90deg,
          transparent 0 18px,
          var(--grid) 18px 19px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0 18px,
          var(--grid) 18px 19px
        );
      color: var(--ink);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 150px;
      height: 150px;
      top: 18px;
      right: -40px;
      background:
        radial-gradient(circle at center, #fff9 0 30%, transparent 31%),
        conic-gradient(from 0deg, #fff6, #ffb8e5, #c4b4ff, #fff6);
      border: var(--pixel-border);
      box-shadow: var(--pixel-shadow);
      opacity: 0.7;
      clip-path: polygon(50% 0%, 61% 38%, 100% 50%, 61% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
    }

    body::after {
      width: 110px;
      height: 110px;
      left: -22px;
      bottom: 96px;
      background: linear-gradient(135deg, #fff2, #ffc1e7 50%, #92bcff);
      border: var(--pixel-border);
      box-shadow: var(--pixel-shadow);
      transform: rotate(12deg);
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(100%, var(--max-width));
      min-height: 100vh;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      flex-direction: column;
      gap: 14px;
    }

    .screen.active {
      display: flex;
    }

    .pixel-panel,
    .speech-bubble,
    .profile-card,
    .message-card,
    .question-list button,
    .crowd-card {
      border: var(--pixel-border);
      box-shadow: var(--pixel-shadow);
    }

    .pixel-panel {
      background: var(--panel);
      padding: 12px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .hero-title {
      background: var(--panel);
      border: var(--pixel-border);
      box-shadow: var(--pixel-shadow);
      padding: 14px;
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(1.5rem, 6vw, 2rem);
      line-height: 1.1;
      letter-spacing: 1px;
    }

    .group-scene {
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 24px;
      box-shadow: none;
      background: #fdf7ff;
      min-height: 260px;
      padding: 18px 10px 14px;
    }

    .group-scene::before {
      display: none;
    }

    .crowd-wrap {
      position: relative;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: flex-start;
      padding: 0;
      align-items: center;
      isolation: isolate;
    }

    .crowd-row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: end;
    }

    .crowd-card {
      position: relative;
      padding: 0;
      flex: 0 0 12.5%;
      width: calc(12.5% + 110px);
      margin-left: -48px;
      text-align: center;
      border: 0;
      box-shadow: none;
      background: transparent;
      z-index: 1;
    }

    .crowd-row .crowd-card:first-child {
      margin-left: 0;
    }

    .crowd-card:nth-child(odd) {
      z-index: 2;
    }

    .crowd-card .character-sprite {
      width: 100%;
      aspect-ratio: 0.72 / 1;
      min-height: 104px;
      max-height: 128px;
    }

    .character-sprite {
      /* Remplace le placeholder géométrique par tes vrais sprites ici */
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.1;
      min-height: 44px;
      position: relative;
      overflow: hidden;
    }

    .character-sprite.placeholder {
      border: var(--pixel-border);
      background: var(--char-color, var(--pink));
    }

    .character-sprite.placeholder::before,
    .character-sprite.placeholder::after {
      content: "";
      position: absolute;
      background: var(--ink);
    }

    .character-sprite.real-sprite img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform-origin: center bottom;
    }

    .character-sprite.placeholder.shape-circle {
      border-radius: 50% 50% 12% 12%;
    }

    .character-sprite.placeholder.shape-diamond {
      clip-path: polygon(50% 0%, 100% 44%, 82% 100%, 18% 100%, 0% 44%);
    }

    .character-sprite.placeholder.shape-hex {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }

    .character-sprite.placeholder::before {
      width: 10px;
      height: 10px;
      left: 22%;
      top: 28%;
      box-shadow: 24px 0 0 var(--ink);
    }

    .character-sprite.placeholder::after {
      width: 38%;
      height: 8px;
      left: 31%;
      top: 58%;
    }

    .char-name {
      margin-top: 5px;
      font-size: 0.62rem;
      font-weight: 700;
    }

    .pixel-button {
      appearance: none;
      border: var(--pixel-border);
      background: var(--pink);
      color: var(--ink);
      box-shadow: var(--pixel-shadow);
      font: inherit;
      padding: 10px 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .pixel-button:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--shadow);
    }

    .pixel-button.secondary {
      background: var(--panel-alt);
    }

    .pixel-button.ghost {
      background: #fff;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .profile-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .profile-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .profile-card {
      background: var(--panel);
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .profile-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .profile-card .character-sprite {
      width: 100%;
      max-width: 58px;
      min-height: 58px;
      margin: 0 auto 5px;
    }

    .profile-card .character-sprite.real-sprite {
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .profile-card .character-sprite.real-sprite img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform: none;
      transform-origin: center center;
      animation: none;
    }

    .profile-name {
      font-size: 0.66rem;
      font-weight: 700;
    }

    .interview-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    #screen-interview .pixel-panel,
    #screen-interview .speech-bubble,
    #screen-interview .question-list button {
      border: 0;
      box-shadow: none;
    }

    .speech-bubble {
      position: relative;
      background: #fffdf8;
      padding: 14px;
      min-height: 90px;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      left: 24px;
      bottom: -14px;
      width: 18px;
      height: 18px;
      background: #fffdf8;
      transform: rotate(45deg);
    }

    .speech-bubble.visible {
      animation: bubbleIn 180ms steps(4, end);
    }

    .interview-stage {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .selected-card {
      background: linear-gradient(180deg, #ffe7f6, #e0d8ff);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .selected-card .character-sprite {
      width: min(58vw, 190px);
    }

    .selected-name {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .question-list {
      display: grid;
      gap: 10px;
    }

    .question-list button {
      width: 100%;
      text-align: left;
      background: var(--blue);
      padding: 12px;
      font: inherit;
    }

    .messages-list {
      display: grid;
      gap: 12px;
      padding-bottom: 8px;
    }

    .message-card {
      background: var(--panel);
      padding: 12px;
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      align-items: start;
    }

    .message-card .character-sprite {
      width: 100%;
      max-width: 72px;
    }

    .message-name {
      font-size: 0.96rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .message-question {
      display: inline-block;
      margin-bottom: 8px;
      padding: 5px 7px;
      background: var(--panel-alt);
      border: 2px solid var(--ink);
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .message-answer {
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.82;
      margin-top: auto;
    }

    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 640px) {
      .app-shell {
        padding-left: 18px;
        padding-right: 18px;
      }

    }

    @media (max-width: 480px) {
      .group-scene {
        min-height: 220px;
        padding-top: 16px;
      }

      .crowd-wrap {
        margin-top: 2px;
        gap: 4px;
      }

      .crowd-row {
        width: 100%;
      }

      .crowd-card {
        flex-basis: 14.2857%;
        width: calc(14.2857% + 68px);
        margin-left: -30px;
      }

      .crowd-card .character-sprite {
        min-height: 84px;
        max-height: 102px;
      }

      .profile-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .profile-card {
        padding: 8px 6px;
      }

      .profile-card .character-sprite {
        max-width: 72px;
        min-height: 72px;
      }

      .profile-name {
        font-size: 0.72rem;
      }
    }
  </style>
</head>

    const screens = {
      group: document.getElementById("screen-group"),
      interview: document.getElementById("screen-interview")
    };

    const profileRow = document.getElementById("profileRow");
    const crowdWrap = document.getElementById("crowdWrap");
        const questionList = document.getElementById("questionList");
    const dialogBubble = document.getElementById("dialogBubble");
    const selectedSprite = document.getElementById("selectedSprite");
    const selectedName = document.getElementById("selectedName");

    let selectedPersonId = people[0].id;

    function getPerson(id) {
      return people.find(person => person.id === id) || people[0];
    }

    function shapeClass(shape) {
      if (shape === "diamond") return "shape-diamond";
      if (shape === "hex") return "shape-hex";
      return "shape-circle";
    }

    function getButtonSpritePath(spritePath) {
      if (!spritePath) return null;
      return spritePath.replace(/\.png$/i, "-face.png");
    }

    function createSprite(person, options = {}) {
      const sprite = document.createElement("div");
      const spriteUrl = options.useButtonSprite
        ? (person.buttonSprite || getButtonSpritePath(person.sprite))
        : person.sprite;
      sprite.className = spriteUrl
        ? "character-sprite real-sprite"
        : `character-sprite placeholder ${shapeClass(person.avatarPlaceholder)}`;
      if (spriteUrl) {
        const image = document.createElement("img");
        image.src = spriteUrl;
        image.alt = person.name;
        image.loading = "lazy";
        sprite.appendChild(image);
      } else {
        sprite.style.setProperty("--char-color", person.color);
      }
      sprite.setAttribute("aria-label", person.name);
      return sprite;
    }

    function renderCrowd() {
      crowdWrap.innerHTML = "";
      const firstRowCount = Math.ceil(people.length / 2);
      const rows = [
        people.slice(0, firstRowCount),
        people.slice(firstRowCount)
      ];

      rows.forEach((rowPeople) => {
        const row = document.createElement("div");
        row.className = "crowd-row";

        rowPeople.forEach((person) => {
          const card = document.createElement("div");
          card.className = "crowd-card";
          card.appendChild(createSprite(person));
          row.appendChild(card);
        });

        crowdWrap.appendChild(row);
      });
    }

    function renderProfiles() {
      profileRow.innerHTML = "";
      people.forEach((person) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "profile-card";
        button.dataset.personId = person.id;

        button.appendChild(createSprite(person, { useButtonSprite: true }));

        const name = document.createElement("div");
        name.className = "profile-name";
        name.textContent = person.name;
        button.appendChild(name);

        profileRow.appendChild(button);
      });
    }

    function renderQuestions() {
      questionList.innerHTML = "";
      questions.forEach((question) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = question.label;
        button.dataset.questionKey = question.key;
        questionList.appendChild(button);
      });
    }

    function renderSelectedPerson() {
      const person = getPerson(selectedPersonId);
      selectedSprite.className = person.sprite
        ? "character-sprite real-sprite"
        : `character-sprite placeholder ${shapeClass(person.avatarPlaceholder)}`;
      selectedSprite.innerHTML = "";
      if (person.sprite) {
        const image = document.createElement("img");
        image.src = person.sprite;
        image.alt = person.name;
        selectedSprite.appendChild(image);
      } else {
        selectedSprite.style.setProperty("--char-color", person.color);
      }
      selectedName.textContent = person.name;
      dialogBubble.textContent = person.answers.goodbye;
      dialogBubble.classList.remove("visible");
      void dialogBubble.offsetWidth;
      dialogBubble.classList.add("visible");
    }

    function showScreen(name) {
      Object.entries(screens).forEach(([key, screen]) => {
        screen.classList.toggle("active", key === name);
      });
    }

    function openInterview(personId) {
      selectedPersonId = personId;
      renderSelectedPerson();
      showScreen("interview");
    }

    profileRow.addEventListener("click", (event) => {
      const button = event.target.closest(".profile-card");
      if (!button) return;
      openInterview(button.dataset.personId);
    });

    questionList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-question-key]");
      if (!button) return;
      const person = getPerson(selectedPersonId);
      const question = questions.find(item => item.key === button.dataset.questionKey);
      dialogBubble.textContent = `${person.name} : ${person.answers[question.key]}`;
      dialogBubble.classList.remove("visible");
      void dialogBubble.offsetWidth;
      dialogBubble.classList.add("visible");
    });

    document.addEventListener("click", (event) => {
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (!action) return;

      if (action === "back-group") {
        showScreen("group");
      }
    });
    renderCrowd();
    renderProfiles();
    renderQuestions();
    renderSelectedPerson();
  </script>
